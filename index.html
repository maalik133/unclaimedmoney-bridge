<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unclaimed Funds Check</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    max-width: 420px;
    width: 100%;
    padding: 20px;
}

.card {
    background: #111;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    text-align: center;
}

h1 {
    font-size: 22px;
    line-height: 1.3;
}

.highlight {
    color: #4ade80;
}

.subtext {
    color: #ccc;
    font-size: 14px;
    margin-top: 8px;
}

.warning {
    background: #1f2937;
    color: #facc15;
    padding: 10px;
    border-radius: 10px;
    margin: 15px 0;
    font-size: 13px;
}

.timer {
    font-size: 18px;
    margin: 10px 0;
    color: #f87171;
    font-weight: bold;
}

.testimonial-box {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
    text-align: left;
}

.name {
    font-weight: bold;
    font-size: 14px;
}

.location {
    font-size: 12px;
    color: #aaa;
}

.amount {
    color: #4ade80;
    font-weight: bold;
}

.btn {
    margin-top: 20px;
    display: block;
    background: white;
    color: black;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

.footer {
    margin-top: 15px;
    font-size: 11px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>
            You May Have <span class="highlight">Unclaimed Money</span><br>
            Waiting Under Your Name
        </h1>

        <div class="subtext">
            Check in under 30 seconds to see if funds are available
        </div>

        <div class="warning">
            ⚠️ Limited records available — verify eligibility now
        </div>

        <div class="timer" id="timer">02:00</div>

        <div class="testimonial-box" id="testimonial">
            <div class="name">Loading...</div>
        </div>

        <!-- CTA (PUT YOUR AFFILIATE LINK BELOW) -->
        <a href="https://giftclick.org/aff_c?offer_id=1420&aff_id=170653" class="btn">Check Available Funds →</a>

        <div class="footer">
            Results may vary. Availability depends on public records.
        </div>

    </div>
</div>

<script>
// Countdown Timer
let time = 120;
const timerEl = document.getElementById("timer");

setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;
    timerEl.innerHTML = 
        `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    if (time > 0) time--;
}, 1000);

// Rotating Testimonials
const testimonials = [
    {
        name: "James R.",
        location: "Texas",
        text: "Found $2,340 in unclaimed funds I didn’t even know existed."
    },
    {
        name: "Ashley M.",
        location: "Florida",
        text: "Took less than a minute — ended up claiming $1,875."
    },
    {
        name: "David L.",
        location: "Georgia",
        text: "Checked out of curiosity and saw $3,120 tied to my name."
    },
    {
        name: "Marcus T.",
        location: "Ohio",
        text: "Was skeptical at first but actually found $980 sitting there."
    },
    {
        name: "Brianna K.",
        location: "California",
        text: "Quick check showed $2,600 from old accounts."
    }
];

let index = 0;
const testimonialEl = document.getElementById("testimonial");

function updateTestimonial() {
    const t = testimonials[index];
    testimonialEl.innerHTML = `
        <div class="name">${t.name}</div>
        <div class="location">${t.location}</div>
        <div class="amount">${t.text}</div>
    `;
    index = (index + 1) % testimonials.length;
}

updateTestimonial();
setInterval(updateTestimonial, 3000);
</script>

</body>
</html>
